<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Tài khoản E-Commerce</title>
</head>
<body>
    <h1>Đăng ký Tài khoản</h1>
    <form action="#" method="POST">
        <fieldset>
            <legend>Thông tin cá nhân</legend>

            <label for="name">Họ tên:</label>
            <input type="text" id="name" name="name" required minlength="2" maxlength="50" placeholder="Nhập họ tên đầy đủ">

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required placeholder="you@email.com">

            <label for="phone">Số điện thoại:</label>
            <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="0901234567">

            <label for="dob">Ngày sinh:</label>
            <input type="date" id="dob" name="dob" max="2026-05-13">
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>

            <label for="username">Username:</label>
            <input type="text" id="username" name="username" pattern="[a-zA-Z0-9_]{3,20}" placeholder="username_123">

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required minlength="8" pattern="(?=.*[A-Z])(?=.*\d).{8,}" placeholder="Mật khẩu ít nhất 8 ký tự, có chữ hoa và số">

            <label for="confirm_password">Xác nhận Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="8" pattern="(?=.*[A-Z])(?=.*\d).{8,}" placeholder="Nhập lại mật khẩu">
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <label for="city">Thành phố:</label>
            <select id="city" name="city">
                <option value="">Chọn thành phố</option>
                <option value="hanoi">Hà Nội</option>
                <option value="hcm">TP. Hồ Chí Minh</option>
                <option value="danang">Đà Nẵng</option>
                <option value="cantho">Cần Thơ</option>
                <option value="haiphong">Hải Phòng</option>
            </select>

            <label for="district">Quận/Huyện:</label>
            <select id="district" name="district">
                <option value="">Chọn quận/huyện</option>
            </select>

            <label for="address">Địa chỉ chi tiết:</label>
            <textarea id="address" name="address" rows="3" placeholder="Nhập địa chỉ chi tiết"></textarea>

            <label>Giới tính:</label>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Nam</label>
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Nữ</label>
            <input type="radio" id="other" name="gender" value="other">
            <label for="other">Khác</label>
        </fieldset>

        <label for="agree">
            <input type="checkbox" id="agree" name="agree" required>
            Tôi đồng ý với điều khoản và chính sách
        </label>

        <button type="submit">Đăng ký</button>
        <button type="reset">Reset</button>
    </form>
</body>
</html>
