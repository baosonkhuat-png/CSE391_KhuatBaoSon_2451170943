<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Validation Test</title>
</head>
<body>
    <form id="testForm">
        <div class="case">
            <h3>Trường hợp 1: Required</h3>
            <label>Trống:</label>
            <input type="text" required value="">
        </div>
        
        <div class="case">
            <h3>Trường hợp 2: Email</h3>
            <label>Nhập "abc":</label>
            <input type="email" value="abc">
        </div>

        <div class="case">
            <h3>Trường hợp 3: Number (1-10)</h3>
            <label>Nhập 15:</label>
            <input type="number" min="1" max="10" value="15">
        </div>

        <div class="case">
            <h3>Trường hợp 4: Pattern (10 chữ số)</h3>
            <label>Nhập "abc123":</label>
            <input type="text" pattern="[0-9]{10}" value="abc123">
        </div>

        <div class="case">
            <h3>Trường hợp 5: Minlength (8)</h3>
            <label>Nhập "123":</label>
            <input type="password" minlength="8" value="123">
        </div>

        <button type="submit" class="submit-btn">Submit</button>
    </form>
</body>
</html>
