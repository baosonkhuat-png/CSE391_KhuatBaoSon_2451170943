<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Animations Demo</title>
  <link rel="stylesheet" href="animations.css">
</head>
<body>
  <main class="animations-page">
    <header class="demo-header">
      <h1>Demo CSS Transitions & Animations</h1>
      <p>5 hiệu ứng bằng CSS: hover card, hover button, zoom ảnh, spinner và fade-in.</p>
    </header>

    <section class="demo-block fade-in">
      <h2>Card Hover Effect</h2>
      <div class="demo-grid">
        <div class="demo-card">
          <h3>Product Card</h3>
          <p>Hover here</p>
        </div>
      </div>
    </section>

    <section class="demo-block fade-in">
      <h2>Button Hover</h2>
      <button class="demo-button">Mua ngay</button>
    </section>

    <section class="demo-block fade-in">
      <h2>Image Zoom on Hover</h2>
      <div class="image-zoom-wrapper">
        <img src="https://placehold.co/500x300?text=Zoom+Image" alt="Zoom Image">
      </div>
    </section>

    <section class="demo-block fade-in">
      <h2>Loading Spinner</h2>
      <div class="spinner"></div>
    </section>

    <section class="demo-block fade-in">
      <h2>Fade-in Section</h2>
      <div class="fade-panel">
        <p>Đây là hiệu ứng fade-in khi nội dung xuất hiện trên trang.</p>
      </div>
    </section>
  </main>
</body>
</html>
