<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Positioning Playground</title>
  <link rel="stylesheet" href="positioning.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">MyShop</div>
    <nav class="main-nav">
      <a href="#home">Home</a>
      <a href="#products">Products</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <main class="page-layout">
    <aside class="sidebar">
      <h2>Categories</h2>
      <ul>
        <li><a href="#">Furniture</a></li>
        <li><a href="#">Decor</a></li>
        <li><a href="#">Lighting</a></li>
        <li><a href="#">Accessories</a></li>
      </ul>
    </aside>

    <section class="content">
      <h1>Positioning</h1>

      <div class="product-grid">
        <article class="product-card">
          <span class="badge">HOT</span>
          <img src="https://via.placeholder.com/320x180" alt="Product 1" />
          <h2>Product 1</h2>
          <p>Mô tả</p>
        </article>
        <article class="product-card">
          <span class="badge">HOT</span>
          <img src="https://via.placeholder.com/320x180" alt="Product 2" />
          <h2>Product 2</h2>
          <p>Mô tả</p>
        </article>
        <article class="product-card">
          <span class="badge">HOT</span>
          <img src="https://via.placeholder.com/320x180" alt="Product 3" />
          <h2>Product 3</h2>
          <p>Mô tả</p>
        </article>
        <article class="product-card">
          <span class="badge">HOT</span>
          <img src="https://via.placeholder.com/320x180" alt="Product 4" />
          <h2>Product 4</h2>
          <p>Mô tả</p>
        </article>
      </div>

      <div class="filler">
        <p>1</p>
        <p>2</p>
        <p>3</p>
        <p>4</p>
        <p>5</p>
        <p>6</p>
        <p>7</p>
        <p>8</p>
        <p>9</p>
        <p>10</p>
      </div>
    </section>
  </main>

  <button class="scroll-top" aria-label="Scroll to top">↑</button>
</body>
</html>
