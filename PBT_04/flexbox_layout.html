<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flexbox Layout</title>
  <link rel="stylesheet" href="flexbox.css" />
</head>
<body>
  <header class="navbar">
    <div class="logo">Brand</div>
    <nav class="menu">
      <a href="#home">Home</a>
      <a href="#products">Products</a>
      <a href="#about">About</a>
    </nav>
    <div class="auth-buttons">
      <button class="btn secondary">Login</button>
      <button class="btn primary">Register</button>
    </div>
  </header>

  <main class="cards-section">
    <h1>Featured Products</h1>
    <div class="card-grid">
      <article class="card">
        <img src="https://via.placeholder.com/400x250" alt="Item 1" />
        <div class="card-body">
          <h2>Item 1</h2>
          <span class="price">$29.99</span>
          <button class="btn buy">Mua</button>
        </div>
      </article>
      <article class="card">
        <img src="https://via.placeholder.com/400x250" alt="Item 2" />
        <div class="card-body">
          <h2>Item 2</h2>
          <span class="price">$39.99</span>
          <button class="btn buy">Mua</button>
        </div>
      </article>
      <article class="card">
        <img src="https://via.placeholder.com/400x250" alt="Item 3" />
        <div class="card-body">
          <h2>Item 3</h2>
          <span class="price">$49.99</span>
          <button class="btn buy">Mua</button>
        </div>
      </article>
      <article class="card">
        <img src="https://via.placeholder.com/400x250" alt="Item 4" />
        <div class="card-body">
          <h2>Item 4</h2>
          <span class="price">$34.99</span>
          <button class="btn buy">Mua</button>
        </div>
      </article>
      <article class="card">
        <img src="https://via.placeholder.com/400x250" alt="Item 5" />
        <div class="card-body">
          <h2>Item 5</h2>
          <span class="price">$59.99</span>
          <button class="btn buy">Mua</button>
        </div>
      </article>
      <article class="card">
        <img src="https://via.placeholder.com/400x250" alt="Item 6" />
        <div class="card-body">
          <h2>Item 6</h2>
          <span class="price">$44.99</span>
          <button class="btn buy">Mua</button>
        </div>
      </article>
      <article class="card">
        <img src="https://via.placeholder.com/400x250" alt="Item 7" />
        <div class="card-body">
          <h2>Item 7</h2>
          <span class="price">$24.99</span>
          <button class="btn buy">Mua</button>
        </div>
      </article>
      <article class="card">
        <img src="https://via.placeholder.com/400x250" alt="Item 8" />
        <div class="card-body">
          <h2>Item 8</h2>
          <span class="price">$54.99</span>
          <button class="btn buy">Mua</button>
        </div>
      </article>
    </div>
  </main>
</body>
</html>
