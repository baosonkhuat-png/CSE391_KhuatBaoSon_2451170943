<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Form Validator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="form-shell">
    <h1>Form Validator</h1>

    <form id="registerForm" novalidate>
      <label>
        Tên
        <input id="nameInput" type="text" name="name" placeholder="Nhập tên của bạn" autocomplete="name" />
        <span class="status" id="nameStatus"></span>
        <small class="error" id="nameError"></small>
      </label>

      <label>
        Email
        <input id="emailInput" type="email" name="email" placeholder="you@example.com" autocomplete="email" />
        <span class="status" id="emailStatus"></span>
        <small class="error" id="emailError"></small>
      </label>

      <label>
        Password
        <input id="passwordInput" type="password" name="password" placeholder="Tối thiểu 8 ký tự" autocomplete="new-password" />
        <span class="status" id="passwordStatus"></span>
        <div class="strength-bar">
          <div id="strengthFill"></div>
        </div>
        <small class="error" id="passwordError"></small>
      </label>

      <label>
        Confirm Password
        <input id="confirmInput" type="password" name="confirm" placeholder="Nhập lại mật khẩu" autocomplete="new-password" />
        <span class="status" id="confirmStatus"></span>
        <small class="error" id="confirmError"></small>
      </label>

      <label>
        Phone
        <input id="phoneInput" type="tel" name="phone" placeholder="0901-234-567" autocomplete="tel" maxlength="13" />
        <span class="status" id="phoneStatus"></span>
        <small class="error" id="phoneError"></small>
      </label>

      <button id="submitButton" type="submit" disabled>Đăng ký</button>
    </form>
  </main>

  <div id="successModal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2>Đăng ký thành công!</h2>
      <p id="successMessage"></p>
      <button id="closeSuccess" type="button">Đóng</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
